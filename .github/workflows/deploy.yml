name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run tests
        run: cd backend && npm test -- --coverage
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_PORT: ${{ secrets.TYPESENSE_PORT }}
          TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CASHFREE_APP_ID: ${{ secrets.CASHFREE_APP_ID }}
          CASHFREE_SECRET_KEY: ${{ secrets.CASHFREE_SECRET_KEY }}
          CASHFREE_WEBHOOK_SECRET: ${{ secrets.CASHFREE_WEBHOOK_SECRET }}
          MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          OLA_MAPS_API_KEY: ${{ secrets.OLA_MAPS_API_KEY }}

      - name: Build Docker image
        run: |
          docker build -t nearby-api:latest ./backend
          docker tag nearby-api:latest nearby-api:${{ github.sha }}

      - name: Deploy to DigitalOcean via Coolify
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref":"'"${COMMIT_SHA}"'","branch":"'"${BRANCH}"'","image":"nearby-api:latest"}' \
            "${COOLIFY_WEBHOOK}"

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -X POST "${SLACK_WEBHOOK}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ NearBy API deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ NearBy API Deployment Successful*\n*Branch:* '"${BRANCH}"'\n*Commit:* `'"${COMMIT_SHA}"'`\n*View:* <https://api.nearby.app|api.nearby.app>"
                  }
                }
              ]
            }'

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -X POST "${SLACK_WEBHOOK}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "❌ NearBy API deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ NearBy API Deployment Failed*\n*Branch:* '"${BRANCH}"'\n*Commit:* `'"${COMMIT_SHA}"'`\n*View:* <https://github.com/nearby-app/nearby/actions|GitHub Actions>"
                  }
                }
              ]
            }'
